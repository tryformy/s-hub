<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; overflow:hidden; background:#000; }
  body, html { width:100%; height:100%; }
  iframe { width:100%; height:100%; border:none; display:block; }
</style>
</head>
<body>
<div id="c"></div>
<script>
const p   = new URLSearchParams(location.search);
const tp  = p.get('tp') || 'dl';
const dt  = p.get('dt') || '';
const vol = Math.max(0, Math.min(100, parseInt(p.get('vol')) || 40));
const st  = Math.floor(parseFloat(p.get('st')) || 0);
const c   = document.getElementById('c');

if (tp === 'yt') {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  c.innerHTML = '<div id="yt" style="width:100%;height:100vh"></div>';
  window.onYouTubeIframeAPIReady = () => {
    new YT.Player('yt', {
      width:'100%', height:'100%',
      videoId: dt,
      playerVars: { autoplay:1, start:st, controls:0, modestbranding:1, rel:0 },
      events: { onReady: e => e.target.setVolume(vol) }
    });
  };
} else if (tp === 'twl') {
  c.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${dt}&parent=YOURNAME.github.io&autoplay=true" allowfullscreen></iframe>`;
} else if (tp === 'tw') {
  const h=Math.floor(st/3600), m=Math.floor((st%3600)/60), s=st%60;
  const t=`${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}m${String(s).padStart(2,'0')}s`;
  c.innerHTML = `<iframe src="https://player.twitch.tv/?video=${dt}&parent=YOURNAME.github.io&autoplay=true&t=${t}" allowfullscreen></iframe>`;
} else if (tp === 'sc') {
  c.innerHTML = `<iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(dt)}&auto_play=true" allow="autoplay"></iframe>`;
} else if (tp === 'dr') {
  c.innerHTML = `<iframe src="${dt}" allowfullscreen allow="autoplay"></iframe>`;
}
</script>
</body>
</html>
