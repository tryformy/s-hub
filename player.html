<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin:0; padding:0; overflow:hidden; background:#000; }
        body, html { width:100%; height:100%; pointer-events:none; }
        #c, iframe, video { width:100%; height:100%; border:none; display:block; pointer-events:auto; }
    </style>
</head>
<body>
<div id="c"></div>
<script>
    const p = new URLSearchParams(location.search);
    const tp = p.get('tp') || 'dl';
    const dt = p.get('dt') || '';
    const vol = Math.max(0, Math.min(100, parseInt(p.get('vol')) || 40));
    const st = Math.floor(parseFloat(p.get('st')) || 0);
    const c = document.getElementById('c');

    if (tp === 'yt') {
        // We use the Nadeko Invidious instance for Ad-Free YouTube
        // 'autoplay=1' starts it, 't=' handles the start time
        const nadekoUrl = `https://inv.nadeko.net/embed/${dt}?autoplay=1&t=${st}&listen=0`;
        
        c.innerHTML = `<iframe id="yt-frame" src="${nadekoUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

        // Anti-Pause & Volume Sync Logic
        // Since it's an iframe, we can't always "talk" to it, 
        // but we can ensure it stays focused and visible.
        const frame = document.getElementById('yt-frame');
        
        // Safety check to force the iframe to stay active
        setInterval(() => {
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage('{"event":"command","func":"playVideo"}', '*');
            }
        }, 3000);

    } else if (tp === 'twl' || tp === 'tw') {
        const isVid = dt.startsWith("v");
        const id = isVid ? dt : dt;
        const src = `https://player.twitch.tv/?${isVid ? 'video='+id : 'channel='+id}&parent=localhost&parent=tryformy.github.io&autoplay=true&muted=false`;
        c.innerHTML = `<iframe src="${src}" allowfullscreen></iframe>`;
    } else if (tp === 'sc') {
        c.innerHTML = `<iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(dt)}&auto_play=true" allow="autoplay"></iframe>`;
    } else if (tp === 'dr') {
        const v = document.createElement('video');
        v.src = dt; v.autoplay = true; v.controls = false;
        v.currentTime = st; v.volume = vol/100;
        c.appendChild(v);
    }
</script>
</body>
</html>
